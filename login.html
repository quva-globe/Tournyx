<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Tournyx</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- GLOBAL VARIABLES --- */
        :root {
            --primary-bg: #070311;
            --card-bg: rgba(20, 10, 35, 0.7);
            --input-bg: rgba(10, 5, 20, 0.8);
            --card-border: rgba(189, 0, 255, 0.3);
            --accent-cyan: #00f2ff;
            --accent-purple: #bd00ff;
            --accent-gradient: linear-gradient(90deg, #bd00ff, #00f2ff);
            --text-main: #ffffff;
            --text-muted: #a0a0b0;
            --font-head: 'Orbitron', sans-serif;
            --font-body: 'Rajdhani', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            font-family: var(--font-body);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* --- BACKGROUND --- */
        #particles-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #15062e 0%, #070311 100%);
        }

        /* --- AUTH CARD --- */
        .auth-container { width: 100%; max-width: 420px; padding: 20px; z-index: 10; animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        @keyframes popIn {
            0% { transform: scale(0.9) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .auth-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(15px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(189,0,255,0.1);
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: var(--accent-gradient);
            box-shadow: 0 0 15px var(--accent-purple);
        }

        /* --- LOGO AREA --- */
        .logo-area { text-align: center; margin-bottom: 25px; }
        
        .brand-logo {
            width: 100px; height: 100px;
            object-fit: contain;
            margin-bottom: 5px;
            animation: floatLogo 3s ease-in-out infinite;
            filter: drop-shadow(0 0 15px rgba(189, 0, 255, 0.6));
        }

        @keyframes floatLogo {
            0%, 100% { transform: translateY(0); filter: drop-shadow(0 0 15px rgba(189, 0, 255, 0.6)); }
            50% { transform: translateY(-8px); filter: drop-shadow(0 0 25px rgba(189, 0, 255, 0.9)); }
        }

        .app-name { 
            font-family: var(--font-head); font-size: 1.6rem; letter-spacing: 3px; font-weight: 900;
            background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(255,255,255,0.1);
        }

        /* --- TABS --- */
        .role-tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        
        .role-tab-btn {
            flex: 1; padding: 12px; text-align: center; cursor: pointer;
            font-family: var(--font-head); font-size: 0.95rem; font-weight: bold;
            color: #888; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; transition: 0.3s; background: rgba(0,0,0,0.4);
        }

        .role-tab-btn.active {
            background: rgba(189, 0, 255, 0.15);
            border-color: var(--accent-purple); color: white;
            box-shadow: 0 0 15px rgba(189, 0, 255, 0.3); text-shadow: 0 0 5px rgba(255,255,255,0.5);
        }
        
        .role-tab-btn.active.org-btn {
            background: rgba(0, 242, 255, 0.15);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        /* --- SUB TABS --- */
        .sub-tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sub-tab {
            flex: 1; text-align: center; padding-bottom: 10px;
            font-size: 0.95rem; color: #666; cursor: pointer; position: relative; font-family: var(--font-head); font-weight: bold; transition: 0.3s;
        }
        .sub-tab.active { color: white; text-shadow: 0 0 5px rgba(255,255,255,0.3); }
        .sub-tab.active::after {
            content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 3px;
            background: var(--accent-purple); box-shadow: 0 -2px 10px var(--accent-purple); border-radius: 2px 2px 0 0;
        }

        /* --- FORMS & INPUTS --- */
        .form-section { display: none; animation: fadeSlideUp 0.4s ease-out forwards; }
        .form-section.active { display: block; }

        @keyframes fadeSlideUp { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .input-group { position: relative; margin-bottom: 15px; }
        .input-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #666; transition: 0.3s; }
        
        .form-control {
            width: 100%; background: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            padding: 14px 15px 14px 45px; color: white;
            font-family: var(--font-body); font-size: 1rem; outline: none; transition: 0.3s;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .form-control:focus { 
            border-color: var(--accent-purple); 
            box-shadow: 0 0 15px rgba(189, 0, 255, 0.2), inset 0 0 10px rgba(0,0,0,0.5); 
        }
        .form-control:focus + .input-icon, .form-control:not(:placeholder-shown) + .input-icon { color: var(--accent-cyan); }
        
        /* Auto-fill style fix */
        input:-webkit-autofill { -webkit-box-shadow: 0 0 0 30px var(--input-bg) inset !important; -webkit-text-fill-color: white !important; }

        .submit-btn {
            width: 100%; padding: 15px; background: var(--accent-gradient);
            border: none; border-radius: 12px; color: white;
            font-family: var(--font-head); font-size: 1.05rem; font-weight: 700; letter-spacing: 1px;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
            box-shadow: 0 5px 20px rgba(189,0,255,0.4); position: relative; overflow: hidden;
        }
        .submit-btn::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
            animation: shimmerBtn 2.5s infinite;
        }
        @keyframes shimmerBtn { 100% { left: 200%; } }
        .submit-btn:active { transform: scale(0.96); box-shadow: 0 2px 10px rgba(189,0,255,0.4); }

        /* Organizer Apply Link */
        .org-apply-box { margin-top: 25px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .org-apply-btn {
            display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px;
            border: 1px solid var(--accent-cyan); border-radius: 20px; background: rgba(0,242,255,0.05);
            color: var(--accent-cyan); text-decoration: none; font-size: 0.85rem; font-family: var(--font-head); font-weight: bold; transition: 0.3s;
        }
        .org-apply-btn:hover { background: var(--accent-cyan); color: #000; box-shadow: 0 0 15px rgba(0,242,255,0.4); }

        /* Loading & Errors */
        .loading-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5,3,15,0.95); z-index: 20; display: none;
            flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }
        .loading-overlay.active { display: flex; animation: fadeIn 0.3s; }
        .spinner {
            width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--accent-cyan); border-radius: 50%;
            animation: spin 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) infinite; margin-bottom: 15px; box-shadow: 0 0 15px rgba(0,242,255,0.5);
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .error-msg { 
            background: rgba(255, 77, 77, 0.1); border: 1px solid rgba(255, 77, 77, 0.3);
            color: #ff4d4d; text-align: center; padding: 10px; border-radius: 10px;
            margin-bottom: 15px; font-size: 0.85rem; display: none; font-family: var(--font-body); font-weight: bold;
            animation: fadeSlideUp 0.3s;
        }

    </style>
</head>
<body>

    <canvas id="particles-canvas"></canvas>

    <div class="auth-container">
        <div class="auth-card">
            
            <div class="logo-area">
                <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEipVmqyUEA22VpntZdPCHuXoO_Rjco_cRaNl5CyFa-eehdtgXnHe6JoD8a5svxJRJYZfv_yXwww10T2cL2PHTiXLK-J-nWC1swmMs5RDxGVM8FBSlJORaRiX4YiD8gL8SyM4X1tRyQn_v8MsqQvbU4uEyHEU0qaySP1STWHaBEYuWKyF3-6QovSqJR-8xU/s1024/1000093705.png" alt="Tournyx Logo" class="brand-logo">
                <div class="app-name">TOURNYX</div>
            </div>

            <div class="role-tabs">
                <div class="role-tab-btn active" id="btnRolePlayer" onclick="switchRole('player')">
                    <i class="fa-solid fa-user"></i> PLAYER
                </div>
                <div class="role-tab-btn org-btn" id="btnRoleOrg" onclick="switchRole('organizer')">
                    <i class="fa-solid fa-crown"></i> ORGANIZER
                </div>
            </div>

            <div class="error-msg" id="errorMsg"><i class="fa-solid fa-triangle-exclamation"></i> Invalid Credentials</div>

            <div id="playerSection" class="form-section active">
                <div class="sub-tabs">
                    <div class="sub-tab active" onclick="switchPlayerSub('login')">LOGIN</div>
                    <div class="sub-tab" onclick="switchPlayerSub('signup')">SIGN UP</div>
                </div>

                <form id="playerLoginForm" style="display:block;">
                    <div class="input-group">
                        <input type="email" name="email" class="form-control" placeholder="Player Email" required>
                        <i class="fa-solid fa-envelope input-icon"></i>
                    </div>
                    <div class="input-group">
                        <input type="password" name="password" class="form-control" placeholder="Password" required>
                        <i class="fa-solid fa-lock input-icon"></i>
                    </div>
                    <button type="submit" class="submit-btn">ENTER BATTLEGROUND</button>
                </form>

                <form id="playerSignupForm" style="display:none;">
                    <div class="input-group">
                        <input type="text" name="username" class="form-control" placeholder="Username" required>
                        <i class="fa-solid fa-user input-icon"></i>
                    </div>
                    <div class="input-group">
                        <input type="text" name="ign" class="form-control" placeholder="In-Game Name (IGN)" required>
                        <i class="fa-solid fa-gamepad input-icon"></i>
                    </div>
                    <div class="input-group">
                        <input type="email" name="email" class="form-control" placeholder="Email Address" required>
                        <i class="fa-solid fa-envelope input-icon"></i>
                    </div>
                    <div class="input-group">
                        <input type="password" name="password" class="form-control" placeholder="Create Password" required>
                        <i class="fa-solid fa-lock input-icon"></i>
                    </div>
                    <div class="input-group">
                        <input type="text" name="referral" id="refInput" class="form-control" placeholder="Referral Code (Optional)">
                        <i class="fa-solid fa-gift input-icon"></i>
                    </div>
                    <button type="submit" class="submit-btn">CREATE ACCOUNT</button>
                </form>
            </div>

            <div id="organizerSection" class="form-section">
                <p style="text-align:center; color:#aaa; font-size:0.85rem; margin-bottom:20px; line-height: 1.4;">
                    <i class="fa-solid fa-shield-halved" style="color:var(--accent-cyan);"></i> Restricted Access.<br>Admin Approval Required.
                </p>
                <form id="organizerLoginForm">
                    <div class="input-group">
                        <input type="email" name="email" class="form-control" placeholder="Organizer Email" required>
                        <i class="fa-solid fa-envelope input-icon" style="color:var(--accent-cyan)"></i>
                    </div>
                    <div class="input-group">
                        <input type="password" name="password" class="form-control" placeholder="Access Key" required>
                        <i class="fa-solid fa-key input-icon" style="color:var(--accent-cyan)"></i>
                    </div>
                    <button type="submit" class="submit-btn" style="background:var(--accent-cyan); color:black; box-shadow: 0 5px 20px rgba(0,242,255,0.4);">ORGANIZER LOGIN</button>
                </form>

                <div class="org-apply-box">
                    <p style="font-size:0.8rem; color:#888; margin-bottom:12px;">Want to host tournaments & monetize?</p>
                    <a href="https://docs.google.com/forms/d/e/1FAIpQLSe6k-ejzzvmEdYU6ynHlMIyr_PgQibH5ViBV5_v3HBpCdIbjw/viewform?usp=dialog" target="_blank" class="org-apply-btn">
                        Apply for Access <i class="fa-solid fa-arrow-up-right-from-square"></i>
                    </a>
                </div>
            </div>

            <div class="loading-overlay" id="loader">
                <div class="spinner"></div>
                <div style="font-family: var(--font-head); font-weight: bold; color:white; letter-spacing: 1px;" id="loadingText">AUTHENTICATING...</div>
            </div>

        </div>
    </div>

    <script>
        // --- PARTICLES ENGINE ---
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];
        class P {
            constructor(){ this.x=Math.random()*canvas.width; this.y=Math.random()*canvas.height; this.vx=Math.random()*0.5-0.25; this.vy=Math.random()*0.5-0.25; this.size=Math.random()*2+0.5; }
            u(){ this.x+=this.vx; this.y+=this.vy; if(this.x<0||this.x>canvas.width)this.vx=-this.vx; if(this.y<0||this.y>canvas.height)this.vy=-this.vy; }
            d(){ ctx.fillStyle='rgba(189,0,255,0.4)'; ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fill(); }
        }
        for(let i=0;i<50;i++) particles.push(new P());
        function anim(){ ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>{p.u();p.d()}); requestAnimationFrame(anim); }
        anim();
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

        // --- GOOGLE APPS SCRIPT CONFIG ---
        const API_URL = 'https://script.google.com/macros/s/AKfycbynNLDDXS1wMrU6RGnk4nKb1jfQkQGuqrNIKWAt8wf46MaKP6y1rwGmSJg5fmm4KYU/exec';
        
        // --- SMART URL PARAMETER CATCHER (For Referrals) ---
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const refCode = urlParams.get('ref');
            const tabParam = urlParams.get('tab');

            if (refCode) {
                // Auto-switch to signup and fill code
                switchPlayerSub('signup');
                document.getElementById('refInput').value = refCode;
            }

            if (tabParam === 'organizer') {
                switchRole('organizer');
            }
        });

        // --- TABS LOGIC ---
        const playerSec = document.getElementById('playerSection');
        const orgSec = document.getElementById('organizerSection');
        const btnPlayer = document.getElementById('btnRolePlayer');
        const btnOrg = document.getElementById('btnRoleOrg');
        const errorMsg = document.getElementById('errorMsg');

        function switchRole(role) {
            errorMsg.style.display = 'none';
            if(role === 'player') {
                btnPlayer.classList.add('active'); btnOrg.classList.remove('active');
                playerSec.classList.add('active'); orgSec.classList.remove('active');
            } else {
                btnOrg.classList.add('active'); btnPlayer.classList.remove('active');
                orgSec.classList.add('active'); playerSec.classList.remove('active');
            }
        }

        function switchPlayerSub(sub) {
            const tabs = document.querySelectorAll('.sub-tab');
            const pLogin = document.getElementById('playerLoginForm');
            const pSignup = document.getElementById('playerSignupForm');
            errorMsg.style.display = 'none';

            if(sub === 'login') {
                tabs[0].classList.add('active'); tabs[1].classList.remove('active');
                pLogin.style.display = 'block'; pSignup.style.display = 'none';
            } else {
                tabs[1].classList.add('active'); tabs[0].classList.remove('active');
                pSignup.style.display = 'block'; pLogin.style.display = 'none';
            }
        }

        // --- AUTH LOGIC ---
        const loader = document.getElementById('loader');
        const loadingText = document.getElementById('loadingText');

        // PLAYER SIGNUP
        document.getElementById('playerSignupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            startLoad("CREATING ACCOUNT...");
            
            const formData = new FormData(e.target);
            const rawData = Object.fromEntries(formData);
            
            const payload = {
                action: 'signup',
                username: rawData.username,
                ign: rawData.ign,
                email: rawData.email,
                password: rawData.password,
                referral: rawData.referral || "", 
                role: 'player'
            };

            try {
                const res = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify(payload) 
                });
                const result = await res.json();
                
                if(result.status === 'success') {
                    alert("Account Created Successfully! Please Login to continue.");
                    switchPlayerSub('login');
                    loader.classList.remove('active');
                } else {
                    showError("Signup Failed: " + result.data);
                }
            } catch (err) { showError("Connection Error. Try again."); console.error(err); }
        });

        // PLAYER LOGIN
        document.getElementById('playerLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            startLoad("VERIFYING CREDENTIALS...");
            const email = e.target.email.value;
            const password = e.target.password.value;
            
            try {
                const res = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: 'login', email: email, password: password }) 
                });
                const result = await res.json();
                
                if (result.status === 'success') {
                    loginSuccess(result.data, 'index.html');
                } else { 
                    showError("Invalid Credentials"); 
                }
            } catch (err) { showError("Network Error. Check your connection."); console.error(err); }
        });

        // ORGANIZER LOGIN
        document.getElementById('organizerLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            startLoad("VERIFYING ADMIN ACCESS...");
            const email = e.target.email.value;
            const password = e.target.password.value;
            
            try {
                const res = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: 'login', email: email, password: password }) 
                });
                const result = await res.json();
                
                if (result.status === 'success') {
                    if(result.data.role === 'organizer') {
                        loginSuccess(result.data, 'profile.html');
                    } else {
                        showError("Access Denied. Not an Authorized Organizer.");
                    }
                } else { 
                    showError("Invalid Organizer Credentials"); 
                }
            } catch (err) { showError("System Error."); console.error(err); }
        });

        // Helpers
        function startLoad(msg) { 
            loader.classList.add('active'); 
            loadingText.innerText = msg; 
            errorMsg.style.display = 'none'; 
        }
        function showError(msg) { 
            loader.classList.remove('active'); 
            errorMsg.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> ${msg}`; 
            errorMsg.style.display = 'block'; 
        }
        function loginSuccess(user, redirectUrl) {
            localStorage.setItem('tournyx_user', JSON.stringify(user));
            window.location.href = redirectUrl;
        }
    </script>
</body>
</html>
