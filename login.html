<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://tournyx.in/favicon.ico" sizes="any">
    <link rel="icon" href="https://tournyx.in/favicon.png" type="image/png" sizes="192x192">
    <link rel="apple-touch-icon" href="https://tournyx.in/apple-touch-icon.png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Tournyx Esports</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>

    <style>
        /* --- GLOBAL VARIABLES --- */
        :root {
            --primary-bg: #070311;
            --card-bg: rgba(20, 10, 35, 0.85);
            --input-bg: rgba(10, 5, 20, 0.9);
            --card-border: rgba(189, 0, 255, 0.3);
            --accent-cyan: #00f2ff;
            --accent-purple: #bd00ff;
            --accent-green: #00ff7f;
            --accent-gradient: linear-gradient(90deg, #bd00ff, #00f2ff);
            --text-main: #ffffff;
            --font-head: 'Orbitron', sans-serif;
            --font-body: 'Rajdhani', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        *::-webkit-scrollbar { display: none !important; width: 0 !important; height: 0 !important; background: transparent !important; }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; 
            position: relative;
            padding: 20px;
        }

        /* --- BACKGROUND --- */
        #particles-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 30%, #15062e 0%, #070311 100%);
        }

        /* --- LANDING HERO SECTION --- */
        .landing-container {
            text-align: center; z-index: 10; padding: 20px;
            animation: fadeIn 1s ease-out forwards; width: 100%; max-width: 600px;
        }

        /* ULTIMATE ESPORTS LOGO SHAPE */
        .logo-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, rgba(189, 0, 255, 0.15), rgba(0, 242, 255, 0.15));
            border-radius: 35%; 
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(0, 242, 255, 0.6);
            box-shadow: 0 0 30px rgba(189, 0, 255, 0.5), inset 0 0 20px rgba(0, 242, 255, 0.3);
            animation: floatLogo 3.5s ease-in-out infinite;
        }

        .brand-logo {
            width: 95px; height: 95px; object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.3));
        }

        @keyframes floatLogo {
            0%, 100% { transform: translateY(0); box-shadow: 0 0 30px rgba(189, 0, 255, 0.5), inset 0 0 20px rgba(0, 242, 255, 0.3); }
            50% { transform: translateY(-10px); box-shadow: 0 0 50px rgba(189, 0, 255, 0.8), inset 0 0 35px rgba(0, 242, 255, 0.6); }
        }

        .app-name { 
            font-family: var(--font-head); font-size: 2.2rem; letter-spacing: 4px; font-weight: 900;
            background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .app-tagline { color: #aaa; font-size: 1.1rem; margin-bottom: 25px; font-weight: 500; letter-spacing: 1px; }

        .features-row {
            display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; flex-wrap: wrap;
        }
        .feature-badge {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            padding: 6px 15px; border-radius: 20px; font-size: 0.85rem; color: var(--accent-cyan);
            font-family: var(--font-head); letter-spacing: 1px;
            box-shadow: inset 0 0 10px rgba(0,242,255,0.1);
        }

        /* Action Buttons */
        .action-btn {
            width: 100%; max-width: 320px; margin: 0 auto 15px; padding: 18px;
            border-radius: 15px; font-family: var(--font-head); font-size: 1.1rem; font-weight: bold; letter-spacing: 1px;
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
            text-transform: uppercase;
        }
        
        .btn-primary {
            background: var(--accent-gradient); color: white; border: none;
            box-shadow: 0 5px 20px rgba(189,0,255,0.4);
        }
        .btn-primary:active { transform: scale(0.96); box-shadow: 0 2px 10px rgba(189,0,255,0.4); }

        .btn-secondary {
            background: rgba(0,0,0,0.5); color: white; border: 1px solid var(--accent-cyan);
            box-shadow: inset 0 0 15px rgba(0,242,255,0.1);
        }
        .btn-secondary:hover { background: rgba(0,242,255,0.1); box-shadow: 0 0 20px rgba(0,242,255,0.3); }
        .btn-secondary:active { transform: scale(0.96); }

        .btn-ghost {
            background: transparent; color: #888; border: none; margin-top: 10px;
            font-size: 0.9rem; text-decoration: underline; font-family: var(--font-body);
        }

        /* --- MODALS --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); z-index: 50; display: none;
            align-items: center; justify-content: center; backdrop-filter: blur(3px);
            opacity: 0; transition: opacity 0.3s ease; padding: 15px;
        }
        .modal-overlay.active { display: flex; opacity: 1; }

        .modal-card {
            background: var(--card-bg); border: 1px solid var(--card-border);
            width: 100%; max-width: 420px; border-radius: 20px; padding: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 20px rgba(189,0,255,0.1);
            transform: translateY(50px) scale(0.95); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-height: 85vh; overflow-y: auto; 
            position: relative;
        }
        .modal-overlay.active .modal-card { transform: translateY(0) scale(1); }

        .close-modal {
            position: absolute; top: 15px; right: 20px; font-size: 1.5rem; color: #666;
            cursor: pointer; transition: 0.3s; z-index: 10;
        }
        .close-modal:hover { color: white; transform: rotate(90deg); text-shadow: 0 0 10px var(--accent-cyan); }

        .modal-title { font-family: var(--font-head); font-size: 1.4rem; color: white; margin-bottom: 10px; text-align: center; text-transform: uppercase; letter-spacing: 1px; }

        /* --- PROGRESS BAR ANIMATION --- */
        .form-progress-bg {
            width: 100%; height: 4px; background: rgba(255,255,255,0.1);
            border-radius: 4px; margin-bottom: 20px; overflow: hidden;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.5);
        }
        .form-progress-bar {
            height: 100%; width: 0%; background: var(--accent-gradient);
            transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 15px var(--accent-cyan);
        }

        /* --- FORMS & INPUTS --- */
        .input-group { position: relative; margin-bottom: 15px; }
        .input-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #666; transition: 0.3s; }
        
        .form-control {
            width: 100%; background: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            padding: 14px 15px 14px 45px; color: white;
            font-family: var(--font-body); font-size: 1rem; outline: none; transition: 0.3s;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .form-control:focus { 
            border-color: var(--accent-cyan); 
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2), inset 0 0 10px rgba(0,0,0,0.5); 
        }
        .form-control:focus + .input-icon, .form-control:not(:placeholder-shown) + .input-icon { color: var(--accent-cyan); text-shadow: 0 0 10px var(--accent-cyan); }
        input:-webkit-autofill { -webkit-box-shadow: 0 0 0 30px var(--input-bg) inset !important; -webkit-text-fill-color: white !important; }

        /* Mandatory Verification Glow */
        .verify-alert {
            font-size: 0.8rem; color: var(--accent-green); 
            margin-top: 5px; margin-bottom: 15px; padding-left: 5px; 
            font-family: var(--font-body); font-weight: 600;
            animation: pulseText 2s infinite;
            display: flex; align-items: center; gap: 5px;
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.7; text-shadow: 0 0 5px transparent; }
            50% { opacity: 1; text-shadow: 0 0 10px var(--accent-green); }
        }

        /* Terms Checkbox */
        .terms-group {
            display: flex; align-items: center; gap: 10px; margin-bottom: 15px;
            font-size: 0.85rem; color: #aaa; padding: 5px;
            background: rgba(0, 0, 0, 0.3); border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);
        }
        .terms-group input[type="checkbox"] {
            appearance: none; width: 18px; height: 18px;
            background: var(--input-bg); border: 1px solid var(--accent-cyan);
            border-radius: 4px; cursor: pointer; position: relative;
            transition: 0.3s; box-shadow: inset 0 0 5px rgba(0,242,255,0.2);
        }
        .terms-group input[type="checkbox"]:checked {
            background: var(--accent-cyan); box-shadow: 0 0 15px rgba(0,242,255,0.5);
        }
        .terms-group input[type="checkbox"]:checked::after {
            content: '\f00c'; font-family: 'Font Awesome 6 Free'; font-weight: 900;
            color: #000; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); font-size: 0.7rem;
        }
        .terms-group a { color: var(--accent-cyan); text-decoration: none; font-weight: bold; }
        .terms-group a:hover { text-decoration: underline; text-shadow: 0 0 10px var(--accent-cyan); }

        .submit-btn {
            width: 100%; padding: 15px; background: var(--accent-gradient);
            border: none; border-radius: 12px; color: white;
            font-family: var(--font-head); font-size: 1.05rem; font-weight: 700; letter-spacing: 1px;
            cursor: pointer; transition: 0.3s; margin-top: 5px;
            box-shadow: 0 5px 20px rgba(189,0,255,0.4); text-transform: uppercase;
        }
        .submit-btn:hover { box-shadow: 0 5px 30px rgba(0, 242, 255, 0.6); transform: translateY(-2px); }
        .submit-btn:active { transform: scale(0.96); }

        /* --- THE ULTIMATE ARENA ANIMATION --- */
        .arena-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #070311, #000); z-index: 9999;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .arena-overlay.active { display: flex; animation: bgFlash 2s forwards ease-in; }

        .arena-text {
            font-family: var(--font-head); font-size: 2.5rem; color: var(--accent-cyan);
            font-weight: 900; letter-spacing: 5px; text-shadow: 0 0 30px var(--accent-cyan);
            text-align: center; animation: zoomOutText 1.8s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes zoomOutText {
            0% { transform: scale(2); opacity: 0; filter: blur(10px); }
            30% { transform: scale(1); opacity: 1; filter: blur(0); }
            80% { transform: scale(0.8); opacity: 1; filter: blur(0); color: white; text-shadow: 0 0 50px white; }
            100% { transform: scale(3); opacity: 0; filter: blur(20px); }
        }
        @keyframes bgFlash {
            0% { background: #000; }
            80% { background: #000; }
            100% { background: #fff; } 
        }

        .error-msg { 
            background: rgba(255, 77, 77, 0.1); border: 1px solid rgba(255, 77, 77, 0.3);
            color: #ff4d4d; text-align: center; padding: 10px; border-radius: 10px;
            margin-bottom: 15px; font-size: 0.85rem; display: none; font-family: var(--font-body); font-weight: bold;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* RESPONSIVE DESIGN FOR ALL DEVICES */
        @media (max-width: 480px) {
            .app-name { font-size: 1.8rem; }
            .logo-wrapper { width: 110px; height: 110px; }
            .brand-logo { width: 75px; height: 75px; }
            .action-btn { font-size: 1rem; padding: 15px; }
            .modal-card { padding: 20px; border-radius: 15px; }
            .form-control { font-size: 0.95rem; padding: 12px 15px 12px 40px; }
            .input-icon { left: 12px; }
            .arena-text { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <canvas id="particles-canvas"></canvas>

    <div class="landing-container" id="landingView">
        <div class="logo-wrapper">
            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEipVmqyUEA22VpntZdPCHuXoO_Rjco_cRaNl5CyFa-eehdtgXnHe6JoD8a5svxJRJYZfv_yXwww10T2cL2PHTiXLK-J-nWC1swmMs5RDxGVM8FBSlJORaRiX4YiD8gL8SyM4X1tRyQn_v8MsqQvbU4uEyHEU0qaySP1STWHaBEYuWKyF3-6QovSqJR-8xU/s1024/1000093705.png" alt="Tournyx Logo" class="brand-logo">
        </div>
        <h1 class="app-name">TOURNYX</h1>
        <p class="app-tagline">The Ultimate Esports Arena</p>

        <div class="features-row">
            <span class="feature-badge"><i class="fa-solid fa-trophy"></i> Compete</span>
            <span class="feature-badge"><i class="fa-solid fa-wallet"></i> Earn Cash</span>
            <span class="feature-badge"><i class="fa-solid fa-shield-halved"></i> Build Clans</span>
        </div>

        <button class="action-btn btn-primary" onclick="openModal('loginModal')">
            <i class="fa-solid fa-right-to-bracket"></i> Player Login
        </button>
        <button class="action-btn btn-secondary" onclick="openModal('signupModal')">
            <i class="fa-solid fa-user-plus"></i> Create Account
        </button>
        
        <button class="action-btn btn-ghost" onclick="openModal('orgModal')">
            <i class="fa-solid fa-crown" style="color:var(--accent-orange)"></i> Organizer Portal
        </button>
    </div>

    <div class="modal-overlay" id="loginModal">
        <div class="modal-card">
            <i class="fa-solid fa-xmark close-modal" onclick="closeModals()"></i>
            <h2 class="modal-title" style="color:var(--accent-cyan)">Welcome Back</h2>
            <div class="error-msg" id="loginError"></div>
            
            <form id="playerLoginForm">
                <div class="input-group">
                    <input type="email" name="email" class="form-control" placeholder="Player Email" required>
                    <i class="fa-solid fa-envelope input-icon"></i>
                </div>
                <div class="input-group">
                    <input type="password" name="password" class="form-control" placeholder="Password" required>
                    <i class="fa-solid fa-lock input-icon"></i>
                </div>
                <button type="submit" class="submit-btn" id="btnLogin">LOGIN TO ARENA</button>
            </form>
            <div style="text-align:center; margin-top:15px; font-size:0.9rem; color:#888;">
                New here? <span style="color:var(--accent-cyan); cursor:pointer; text-decoration:underline;" onclick="openModal('signupModal')">Sign Up</span>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="signupModal">
        <div class="modal-card">
            <i class="fa-solid fa-xmark close-modal" onclick="closeModals()"></i>
            <h2 class="modal-title" style="color:var(--accent-purple)">Register</h2>
            
            <div class="form-progress-bg">
                <div class="form-progress-bar" id="regProgressBar"></div>
            </div>

            <div class="error-msg" id="signupError"></div>

            <form id="playerSignupForm">
                <div class="input-group">
                    <input type="text" name="username" class="form-control reg-input" placeholder="Display Name" required>
                    <i class="fa-solid fa-user input-icon"></i>
                </div>
                <div class="input-group">
                    <input type="text" name="ign" class="form-control reg-input" placeholder="In-Game Name (IGN)" required>
                    <i class="fa-solid fa-gamepad input-icon"></i>
                </div>
                <div class="input-group">
                    <input type="text" name="uid" class="form-control reg-input" placeholder="Game UID" required>
                    <i class="fa-solid fa-id-card input-icon"></i>
                </div>
                
                <div>
                    <div class="input-group" style="margin-bottom: 5px;">
                        <input type="tel" name="phone" class="form-control reg-input" placeholder="Phone Number" value="+91 " required>
                        <i class="fa-solid fa-mobile-screen input-icon"></i>
                    </div>
                    <div class="verify-alert">
                        <i class="fa-solid fa-circle-check"></i> Mandatory: Enter valid number for Prize Payouts.
                    </div>
                </div>

                <div>
                    <div class="input-group" style="margin-bottom: 5px;">
                        <input type="email" name="email" class="form-control reg-input" placeholder="Email Address" required>
                        <i class="fa-solid fa-envelope input-icon"></i>
                    </div>
                    <div class="verify-alert" style="color: var(--accent-cyan);">
                        <i class="fa-solid fa-shield-halved"></i> Secure: Required for Account Recovery.
                    </div>
                </div>

                <div class="input-group">
                    <input type="password" name="password" class="form-control reg-input" placeholder="Create Password" required>
                    <i class="fa-solid fa-lock input-icon"></i>
                </div>
                <div class="input-group">
                    <input type="text" name="referral" id="refInput" class="form-control" placeholder="Referral Code (Optional)">
                    <i class="fa-solid fa-gift input-icon"></i>
                </div>

                <div class="terms-group">
                    <input type="checkbox" id="termsCheck" required>
                    <label for="termsCheck">I agree to the <a href="#">Terms & Conditions</a></label>
                </div>

                <button type="submit" class="submit-btn" id="btnSignup">CREATE ACCOUNT</button>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="orgModal">
        <div class="modal-card" style="border-color:var(--accent-orange); box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 20px rgba(255,153,0,0.1);">
            <i class="fa-solid fa-xmark close-modal" onclick="closeModals()"></i>
            <h2 class="modal-title" style="color:var(--accent-orange)"><i class="fa-solid fa-crown"></i> Organizer Hub</h2>
            <div class="error-msg" id="orgError"></div>

            <form id="organizerLoginForm">
                <div class="input-group">
                    <input type="email" name="email" class="form-control" placeholder="Organizer Email" required>
                    <i class="fa-solid fa-envelope input-icon" style="color:var(--accent-orange)"></i>
                </div>
                <div class="input-group">
                    <input type="password" name="password" class="form-control" placeholder="Access Key" required>
                    <i class="fa-solid fa-key input-icon" style="color:var(--accent-orange)"></i>
                </div>
                <button type="submit" class="submit-btn" id="btnOrgLogin" style="background:linear-gradient(90deg, #ff9900, #ff4d4d); box-shadow: 0 5px 20px rgba(255,153,0,0.4);">VERIFY ADMIN</button>
            </form>

            <div style="margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); text-align: center;">
                <a href="https://docs.google.com/forms/d/e/1FAIpQLSe6k-ejzzvmEdYU6ynHlMIyr_PgQibH5ViBV5_v3HBpCdIbjw/viewform?usp=dialog" target="_blank" style="color:#aaa; text-decoration:none; font-size:0.85rem;"><i class="fa-solid fa-file-signature"></i> Apply to Host Tournaments</a>
            </div>
        </div>
    </div>

    <div id="arenaLoader" class="arena-overlay">
        <div class="arena-text">ENTERING THE ARENA</div>
    </div>

    <script>
        // --- GOOGLE APPS SCRIPT CONFIG ---
        const API_URL = 'https://script.google.com/macros/s/AKfycbynNLDDXS1wMrU6RGnk4nKb1jfQkQGuqrNIKWAt8wf46MaKP6y1rwGmSJg5fmm4KYU/exec';

        // --- PARTICLES ENGINE ---
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];
        class P {
            constructor(){ this.x=Math.random()*canvas.width; this.y=Math.random()*canvas.height; this.vx=Math.random()*0.5-0.25; this.vy=Math.random()*0.5-0.25; this.size=Math.random()*2+0.5; }
            u(){ this.x+=this.vx; this.y+=this.vy; if(this.x<0||this.x>canvas.width)this.vx=-this.vx; if(this.y<0||this.y>canvas.height)this.vy=-this.vy; }
            d(){ ctx.fillStyle='rgba(0,242,255,0.3)'; ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fill(); }
        }
        for(let i=0;i<50;i++) particles.push(new P());
        function anim(){ ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>{p.u();p.d()}); requestAnimationFrame(anim); }
        anim();
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const refCode = urlParams.get('ref');
            const tabParam = urlParams.get('tab');

            if (refCode) { openModal('signupModal'); document.getElementById('refInput').value = refCode; }
            if (tabParam === 'organizer') openModal('orgModal');
        });

        // --- PROGRESS BAR LOGIC ---
        const regInputs = document.querySelectorAll('.reg-input');
        const termsCheck = document.getElementById('termsCheck');
        const progressBar = document.getElementById('regProgressBar');
        
        function updateProgress() {
            let filled = 0;
            regInputs.forEach(input => { if(input.value.trim() !== '' && input.value.trim() !== '+91') filled++; });
            if(termsCheck.checked) filled++;
            
            // 6 text inputs + 1 checkbox = 7 mandatory items
            let percentage = (filled / 7) * 100;
            progressBar.style.width = percentage + '%';
            if(percentage === 100) {
                progressBar.style.background = "var(--accent-green)";
                progressBar.style.boxShadow = "0 0 20px var(--accent-green)";
            } else {
                progressBar.style.background = "var(--accent-gradient)";
                progressBar.style.boxShadow = "0 0 15px var(--accent-cyan)";
            }
        }
        
        regInputs.forEach(input => input.addEventListener('input', updateProgress));
        termsCheck.addEventListener('change', updateProgress);

        // --- MODAL LOGIC ---
        function openModal(id) {
            closeModals(); 
            document.getElementById(id).classList.add('active');
            if(id === 'signupModal') updateProgress();
        }
        function closeModals() {
            document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));
            document.querySelectorAll('.error-msg').forEach(e => e.style.display = 'none');
        }

        // --- ANIMATION OVERLAY LOGIC ---
        function triggerArenaEntry(user, redirectUrl) {
            closeModals();
            localStorage.setItem('tournyx_user', JSON.stringify(user));
            const loader = document.getElementById('arenaLoader');
            loader.classList.add('active');
            
            setTimeout(() => {
                window.location.href = redirectUrl;
            }, 1800); 
        }

        // --- AUTH LOGIC ---
        function btnLoading(btnId, text) {
            const btn = document.getElementById(btnId);
            btn.dataset.original = btn.innerHTML;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> ${text}`;
            btn.disabled = true;
        }
        function btnReset(btnId) {
            const btn = document.getElementById(btnId);
            btn.innerHTML = btn.dataset.original;
            btn.disabled = false;
        }

        // PLAYER SIGNUP (No OTP Version)
        document.getElementById('playerSignupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errBox = document.getElementById('signupError');
            errBox.style.display = 'none';

            btnLoading('btnSignup', 'CREATING ACCOUNT...');

            try {
                // Directly capture and send data since OTP is removed
                const formData = new FormData(e.target);
                const rawData = Object.fromEntries(formData);
                
                const payload = {
                    action: 'signup',
                    username: rawData.username,
                    ign: rawData.ign,
                    uid: rawData.uid,       
                    phone: rawData.phone,   
                    email: rawData.email,
                    password: rawData.password,
                    referral: rawData.referral || "", 
                    role: 'player'
                };

                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                
                if(result.status === 'success') {
                    alert("Account Created! You can now Login.");
                    openModal('loginModal');
                } else {
                    errBox.innerText = result.data; errBox.style.display = 'block';
                }
            } catch (err) { 
                console.error(err);
                errBox.innerText = "Connection Error or system unavailable."; 
                errBox.style.display = 'block'; 
            } finally { 
                btnReset('btnSignup'); 
            }
        });

        // PLAYER LOGIN
        document.getElementById('playerLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errBox = document.getElementById('loginError');
            errBox.style.display = 'none';
            btnLoading('btnLogin', 'AUTHENTICATING...');

            const email = e.target.email.value;
            const password = e.target.password.value;
            
            try {
                const res = await fetch(API_URL, { 
                    method: 'POST', body: JSON.stringify({ action: 'login', email: email, password: password }) 
                });
                const result = await res.json();
                
                if (result.status === 'success') {
                    triggerArenaEntry(result.data, 'index.html');
                } else { 
                    errBox.innerText = "Invalid Credentials"; errBox.style.display = 'block'; 
                }
            } catch (err) { errBox.innerText = "Network Error."; errBox.style.display = 'block'; }
            finally { btnReset('btnLogin'); }
        });

        // ORGANIZER LOGIN
        document.getElementById('organizerLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errBox = document.getElementById('orgError');
            errBox.style.display = 'none';
            btnLoading('btnOrgLogin', 'VERIFYING...');

            const email = e.target.email.value;
            const password = e.target.password.value;
            
            try {
                const res = await fetch(API_URL, { 
                    method: 'POST', body: JSON.stringify({ action: 'login', email: email, password: password }) 
                });
                const result = await res.json();
                
                if (result.status === 'success' && result.data.role === 'organizer') {
                    triggerArenaEntry(result.data, 'profile.html');
                } else { 
                    errBox.innerText = "Invalid Admin Credentials"; errBox.style.display = 'block'; 
                }
            } catch (err) { errBox.innerText = "System Error."; errBox.style.display = 'block'; }
            finally { btnReset('btnOrgLogin'); }
        });
    </script>
</body>
</html>
