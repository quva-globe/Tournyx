<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Create Tournament - Tournyx</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-bg: #050511;
            --card-bg: rgba(20, 20, 35, 0.6);
            --input-bg: rgba(10, 10, 20, 0.8);
            --card-border: rgba(255, 255, 255, 0.1);
            --accent-cyan: #00f2ff;
            --accent-purple: #bd00ff;
            --accent-gradient: linear-gradient(90deg, #bd00ff, #00f2ff);
            --text-main: #ffffff;
            --text-muted: #a0a0b0;
            --font-display: 'Orbitron', sans-serif;
            --font-body: 'Rajdhani', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            font-family: var(--font-body);
            overflow-x: hidden;
            padding-bottom: 40px;
        }

        /* --- Background --- */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a0b2e 0%, #050511 100%);
        }

        /* --- Header --- */
        header {
            display: flex;
            align-items: center;
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(5, 5, 17, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .back-btn {
            font-size: 1.2rem;
            color: white;
            margin-right: 15px;
            cursor: pointer;
            text-decoration: none;
        }

        .page-title {
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- Form Container --- */
        .form-container {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .form-section {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 25px 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(5px);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.5s forwards;
        }

        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        .section-header {
            font-family: var(--font-display);
            font-size: 1rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--accent-cyan);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-control {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 12px 15px;
            color: white;
            font-family: var(--font-body);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .form-control:focus {
            border-color: var(--accent-purple);
            box-shadow: 0 0 10px rgba(189, 0, 255, 0.2);
        }

        select.form-control {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 20px;
        }

        .row {
            display: flex;
            gap: 15px;
        }
        .col { flex: 1; }

        /* --- Radio Select Cards --- */
        .radio-group {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .radio-card {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--card-border);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 80px;
        }

        .radio-card.active {
            background: rgba(189, 0, 255, 0.15);
            border-color: var(--accent-purple);
        }

        .radio-card i { font-size: 1.5rem; margin-bottom: 5px; display: block; }
        .radio-card span { font-size: 0.8rem; font-weight: bold; }

        /* --- Submit Button --- */
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--accent-gradient);
            border: none;
            border-radius: 12px;
            color: white;
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(189, 0, 255, 0.4);
            transition: transform 0.2s;
            margin-top: 10px;
        }

        .submit-btn:active { transform: scale(0.98); }
        .submit-btn:disabled { opacity: 0.7; cursor: not-allowed; }

        /* --- Loading Overlay --- */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            display: none;
        }
        
        .loading-overlay.active { display: flex; }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top: 5px solid var(--accent-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .success-msg { text-align: center; font-family: var(--font-display); }

    </style>
</head>
<body>

    <canvas id="particles-canvas"></canvas>

    <header>
        <a href="https://tournyx.blogspot.com/p/tournyx-ultimate-esports-platform_95.html?m=1" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <div class="page-title">CREATE TOURNAMENT</div>
    </header>

    <form id="createForm" class="form-container">
        
        <div class="form-section" style="animation-delay: 0.1s;">
            <div class="section-header"><i class="fa-solid fa-info-circle"></i> Basic Details</div>
            
            <div class="input-group">
                <label class="input-label">Tournament Name</label>
                <input type="text" name="tournament_name" class="form-control" placeholder="Ex: Weekend Warriors Cup" required>
            </div>

            <div class="input-group">
                <label class="input-label">Select Game</label>
                <select name="game" class="form-control" required>
                    <option value="" disabled selected>Choose a game</option>
                    <option value="Free Fire">Free Fire</option>
                    <option value="BGMI">BGMI</option>
                    <option value="Valorant">Valorant</option>
                    <option value="COD Mobile">COD Mobile</option>
                    <option value="Pokemon Unite">Pokemon Unite</option>
                    <option value="LOL: Wild Rift">LOL: Wild Rift</option>
                </select>
            </div>

            <div class="input-group">
                <label class="input-label">Format</label>
                <div class="radio-group">
                    <div class="radio-card" onclick="selectRadio(this, 'Solo')">
                        <i class="fa-solid fa-user"></i>
                        <span>Solo</span>
                    </div>
                    <div class="radio-card active" onclick="selectRadio(this, 'Squad')">
                        <i class="fa-solid fa-users"></i>
                        <span>Squad</span>
                    </div>
                    <div class="radio-card" onclick="selectRadio(this, 'Duo')">
                        <i class="fa-solid fa-user-group"></i>
                        <span>Duo</span>
                    </div>
                </div>
                <input type="hidden" name="format" id="formatInput" value="Squad">
            </div>
        </div>

        <div class="form-section" style="animation-delay: 0.2s;">
            <div class="section-header"><i class="fa-solid fa-calendar-alt"></i> Schedule & Slots</div>
            
            <div class="row">
                <div class="col">
                    <div class="input-group">
                        <label class="input-label">Total Slots</label>
                        <input type="number" name="slots" class="form-control" placeholder="Ex: 48" required>
                    </div>
                </div>
                <div class="col">
                    <div class="input-group">
                        <label class="input-label">Start Date</label>
                        <input type="datetime-local" name="start_date" class="form-control" required>
                    </div>
                </div>
            </div>
        </div>

        <div class="form-section" style="animation-delay: 0.3s;">
            <div class="section-header"><i class="fa-solid fa-trophy"></i> Rewards & Entry</div>
            
            <div class="row">
                <div class="col">
                    <div class="input-group">
                        <label class="input-label">Entry Fee (₹)</label>
                        <input type="number" name="entry_fee" class="form-control" placeholder="0 for Free" required>
                    </div>
                </div>
                <div class="col">
                    <div class="input-group">
                        <label class="input-label">Prize Pool (₹)</label>
                        <input type="number" name="prize_pool" class="form-control" placeholder="Ex: 5000" required>
                    </div>
                </div>
            </div>
        </div>

        <div class="form-section" style="animation-delay: 0.4s;">
            <div class="section-header"><i class="fa-solid fa-link"></i> Community & Contact</div>
            
            <div class="input-group">
                <label class="input-label">Discord/WhatsApp Link</label>
                <input type="url" name="community_link" class="form-control" placeholder="https://discord.gg/..." required>
            </div>
            
            <div class="input-group">
                <label class="input-label">Banner Image URL</label>
                <input type="url" name="banner_url" class="form-control" placeholder="Paste image link here">
            </div>
        </div>

        <button type="submit" class="submit-btn" id="publishBtn">PUBLISH TOURNAMENT</button>

    </form>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <h3 class="success-msg" id="loadingText">Creating Tournament...</h3>
        <p style="color: #aaa; margin-top: 10px; display: none;" id="successSub">Your tournament is now live!</p>
        <button class="btn btn-purple" style="width: auto; margin-top: 20px; display: none; padding: 10px 20px; border-radius: 8px; border: none; color: white; background: #8a2be2; cursor: pointer;" id="closeLoading" onclick="window.location.href='https://tournyx.blogspot.com/p/home.html'">Go to Home</button>
    </div>

    <script>
        // --- Particle Background ---
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particlesArray = [];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.1;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
                this.color = Math.random() > 0.5 ? '#bd00ff' : '#00f2ff';
                this.opacity = Math.random() * 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width) this.speedX = -this.speedX;
                if (this.y < 0 || this.y > canvas.height) this.speedY = -this.speedY;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        function init() { for(let i=0; i<80; i++) particlesArray.push(new Particle()); }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for(let i=0; i<particlesArray.length; i++) { particlesArray[i].update(); particlesArray[i].draw(); }
            requestAnimationFrame(animate);
        }
        init(); animate();

        // --- UI Logic ---
        function selectRadio(el, value) {
            document.querySelectorAll('.radio-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('formatInput').value = value;
        }

        // --- APPS SCRIPT INTEGRATION ---
        
        // 👇 PASTE YOUR APPS SCRIPT WEB APP URL HERE 👇
        const API_URL = 'https://script.google.com/macros/s/AKfycbynNLDDXS1wMrU6RGnk4nKb1jfQkQGuqrNIKWAt8wf46MaKP6y1rwGmSJg5fmm4KYU/exec'; 

        const form = document.getElementById('createForm');
        const loading = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const successSub = document.getElementById('successSub');
        const closeBtn = document.getElementById('closeLoading');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const user = JSON.parse(localStorage.getItem('tournyx_user'));
            if(!user || user.role !== 'organizer') {
                alert("Only organizers can create tournaments.");
                return;
            }

            loading.classList.add('active');

            const formData = new FormData(form);
            const rawData = Object.fromEntries(formData);

            // Prepare Payload for Apps Script
            const payload = {
                action: 'create_tournament',
                email: user.email,
                name: rawData.tournament_name,
                game: rawData.game,
                slots: rawData.slots,
                fee: rawData.entry_fee,
                prize: rawData.prize_pool,
                format: rawData.format,
                start_date: rawData.start_date,
                community: rawData.community_link,
                banner: rawData.banner_url
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (result.status === 'success') {
                    showSuccess();
                } else {
                    throw new Error(result.data || 'Creation failed');
                }
            } catch (error) {
                console.error('Error:', error);
                loadingText.innerText = "Error!";
                successSub.innerText = "Check your internet connection or script URL.";
                successSub.style.display = 'block';
                setTimeout(() => { loading.classList.remove('active'); }, 3000);
            }
        });

        function showSuccess() {
            document.querySelector('.spinner').style.display = 'none';
            loadingText.innerText = "Tournament Live!";
            successSub.innerText = "Your tournament has been published successfully.";
            successSub.style.display = 'block';
            closeBtn.style.display = 'inline-block';
            form.reset();
        }
    </script>
</body>
</html>
