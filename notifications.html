<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notifications - Tournyx</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --primary-bg: #070311;
            --secondary-bg: #0d061e;
            --card-bg: rgba(20, 10, 35, 0.7);
            --card-border: rgba(189, 0, 255, 0.2);
            --accent-cyan: #00f2ff;
            --accent-purple: #bd00ff;
            --text-main: #ffffff;
            --text-muted: #a0a0b0;
            --font-head: 'Orbitron', sans-serif;
            --font-body: 'Rajdhani', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            font-family: var(--font-body);
            overflow-x: hidden;
            padding-bottom: calc(90px + env(safe-area-inset-bottom)); 
            padding-top: calc(65px + env(safe-area-inset-top)); 
        }

        #particles-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 50% 50%, #15062e 0%, #070311 100%);
        }

        /* --- HEADER --- */
        .top-header {
            position: fixed; top: 0; left: 0; width: 100%; 
            padding: env(safe-area-inset-top) 15px 10px 15px; 
            background: rgba(7, 3, 17, 0.85); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--card-border);
            display: flex; align-items: center; justify-content: space-between; z-index: 2000;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .back-btn { color: white; font-size: 1.3rem; text-decoration: none; padding: 5px; cursor: pointer; transition: 0.3s; }
        .back-btn:active { color: var(--accent-cyan); transform: scale(0.9); }
        .app-title { font-family: var(--font-head); font-size: 1.2rem; font-weight: 700; color: white; letter-spacing: 1px; }

        /* --- NOTIFICATION LIST --- */
        .noti-container { padding: 20px 15px; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }
        
        .noti-card {
            background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 16px; padding: 18px 15px; display: flex; gap: 15px;
            backdrop-filter: blur(10px); position: relative; overflow: hidden;
            animation: fadeIn 0.4s ease backwards; box-shadow: 0 5px 20px rgba(0,0,0,0.4);
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .noti-card.unread::before {
            content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 4px;
            background: var(--accent-cyan); box-shadow: 0 0 10px var(--accent-cyan);
        }

        .noti-icon {
            width: 45px; height: 45px; border-radius: 50%; background: rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.1); box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .noti-content { flex: 1; }
        .noti-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
        .noti-title { font-family: var(--font-head); font-size: 1.05rem; color: white; font-weight: bold; }
        .noti-time { font-size: 0.75rem; color: var(--text-muted); white-space: nowrap; }
        .noti-desc { font-size: 0.85rem; color: #ccc; line-height: 1.4; }

        .empty-state { text-align: center; padding: 50px 20px; color: #888; }
        .empty-state i { font-size: 3rem; margin-bottom: 15px; color: #444; }
        .empty-state h3 { font-family: var(--font-head); color: white; margin-bottom: 5px; }

        /* --- MEDIAN HIDER --- */
        .median-active .top-header { display: none !important; }
        .median-active { padding-top: 15px !important; }
    </style>

    <script>
        // Hide Web Header if inside Median.co app
        document.addEventListener("DOMContentLoaded", function() {
            if (navigator.userAgent.indexOf('gonative') > -1 || navigator.userAgent.indexOf('median') > -1) {
                document.body.classList.add('median-active');
            }
        });
    </script>
</head>
<body>

    <canvas id="particles-canvas"></canvas>

    <header class="top-header">
        <div class="header-left">
            <a href="javascript:history.back()" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
            <div class="app-title">NOTIFICATIONS</div>
        </div>
        <i class="fa-solid fa-check-double" style="color:var(--accent-cyan); font-size: 1.2rem; cursor:pointer;" onclick="markAllRead()"></i>
    </header>

    <div class="noti-container" id="notiList">
        <div style="text-align:center; padding:40px; color:var(--accent-cyan);">
            <i class="fa-solid fa-spinner fa-spin" style="font-size:2rem; margin-bottom:10px;"></i><br>
            <span style="font-family:var(--font-head); font-weight:bold;">Syncing Server...</span>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbynNLDDXS1wMrU6RGnk4nKb1jfQkQGuqrNIKWAt8wf46MaKP6y1rwGmSJg5fmm4KYU/exec"; 

        window.onload = () => {
            fetchNotifications();
        };

        function fetchNotifications() {
            fetch(API_URL + "?action=get_notifications")
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('notiList');
                container.innerHTML = "";

                if(data.status === "success" && data.data.length > 0) {
                    data.data.forEach((alert, index) => {
                        let delay = (index * 0.1) + "s";
                        
                        // Parse date properly to readable format
                        let dateObj = new Date(alert.date);
                        let timeString = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

                        container.innerHTML += `
                            <div class="noti-card unread" style="animation-delay: ${delay};">
                                <div class="noti-icon" style="color:${alert.color}; border-color:${alert.color}40;"><i class="fa-solid ${alert.icon}"></i></div>
                                <div class="noti-content">
                                    <div class="noti-header">
                                        <div class="noti-title">${alert.title}</div>
                                        <div class="noti-time">${timeString}</div>
                                    </div>
                                    <div class="noti-desc">${alert.message}</div>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fa-regular fa-bell-slash"></i>
                            <h3>All Caught Up!</h3>
                            <p>You have no new notifications right now.</p>
                        </div>
                    `;
                }
            }).catch(err => {
                document.getElementById('notiList').innerHTML = `<div class="empty-state"><i class="fa-solid fa-triangle-exclamation"></i><h3>Connection Error</h3><p>Could not load notifications.</p></div>`;
            });
        }

        function markAllRead() {
            document.querySelectorAll('.noti-card').forEach(card => card.classList.remove('unread'));
        }

        // Background Animation
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let pArray = [];
        for(let i=0; i<30; i++) pArray.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2});
        function anim() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = 'rgba(0,242,255,0.3)';
            pArray.forEach(p => { p.y -= 0.5; if(p.y < 0) p.y = canvas.height; ctx.beginPath(); ctx.arc(p.x,p.y,p.s,0,Math.PI*2); ctx.fill(); });
            requestAnimationFrame(anim);
        }
        anim();
    </script>
</body>
</html>
