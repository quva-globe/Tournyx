<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Organizer Portal | Tournyx</title>
    
    <link rel="icon" href="https://tournyx.in/favicon.ico" sizes="any">
    <link rel="icon" href="https://tournyx.in/favicon.png" type="image/png" sizes="192x192">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        /* --- GLOBAL VARIABLES --- */
        :root {
            --primary-bg: #070311;
            --card-bg: rgba(20, 10, 35, 0.75);
            --card-border: rgba(189, 0, 255, 0.3);
            --accent-cyan: #00f2ff;
            --accent-purple: #bd00ff;
            --accent-green: #00ff7f;
            --accent-gradient: linear-gradient(135deg, #7b2cbf, #bd00ff, #00f2ff);
            --font-head: 'Orbitron', sans-serif;
            --font-body: 'Rajdhani', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        /* PERFECT RESPONSIVE BODY */
        body {
            font-family: var(--font-body);
            background-color: var(--primary-bg);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Allow scrolling on small screens, hide horizontal overflow */
            overflow-x: hidden;
            overflow-y: auto;
            padding: 40px 15px; 
        }

        /* --- BACKGROUND PARTICLES --- */
        #particles-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 50% 0%, #15062e 0%, #070311 100%); pointer-events: none; }

        /* --- GLASSMORPHISM CONTAINER --- */
        .container {
            background: var(--card-bg);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            padding: 40px 25px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 420px;
            border: 1px solid var(--card-border);
            box-shadow: 0 15px 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(189, 0, 255, 0.15);
            animation: slideUpGlow 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
            position: relative;
            margin: auto; /* Centers safely when scrolling */
        }
        
        /* Smooth Desktop Scaling */
        @media (min-width: 768px) {
            .container {
                max-width: 500px;
                padding: 50px 40px;
                transform: scale(1.05);
            }
        }

        @keyframes slideUpGlow { 
            0% { opacity: 0; transform: translateY(40px) scale(0.95); } 
            100% { opacity: 1; transform: translateY(0) scale(1); } 
        }

        /* --- LOGO & HEADERS --- */
        .logo-container { text-align: center; margin-bottom: 30px; }
        .logo-container img { width: 65px; height: 65px; border-radius: 50%; box-shadow: 0 0 25px rgba(189, 0, 255, 0.6); border: 2px solid rgba(255,255,255,0.2); margin-bottom: 12px; animation: floatLogo 3s ease-in-out infinite;}
        
        @keyframes floatLogo {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); box-shadow: 0 0 35px rgba(0, 242, 255, 0.6); border-color: rgba(0, 242, 255, 0.4);}
        }

        .logo-text { font-family: var(--font-head); font-size: 1.8rem; font-weight: 900; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        .tagline { color: #aaa; font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase; font-family: var(--font-head); font-weight: bold; }

        /* --- INPUTS --- */
        .input-group { margin-bottom: 25px; position: relative; }
        
        /* PERFECT ICON POSITIONING: Anchored to the bottom, safely inside the input field */
        .input-group i { position: absolute; left: 18px; bottom: 15px; color: #888; font-size: 1.1rem; transition: 0.3s; z-index: 2; pointer-events: none;}
        
        label { display: block; font-size: 0.8rem; color: #aaa; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; font-family: var(--font-head); font-weight: bold;}
        
        input {
            width: 100%; padding: 15px 15px 15px 50px; border-radius: 12px; background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1); color: white; font-family: var(--font-body); font-size: 1rem; font-weight: bold; box-sizing: border-box;
            transition: all 0.3s ease; outline: none; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); position: relative;
        }
        input:focus { border-color: var(--accent-cyan); box-shadow: 0 0 15px rgba(0,242,255,0.3), inset 0 0 10px rgba(0,0,0,0.5); background: rgba(0,0,0,0.8);}
        input:focus + i, .input-group input:focus ~ i { color: var(--accent-cyan); text-shadow: 0 0 10px rgba(0,242,255,0.5); transform: scale(1.1);}

        /* --- FORMAT SELECTOR --- */
        .format-grid { display: flex; gap: 10px; margin-bottom: 30px; }
        .format-btn {
            flex: 1; padding: 12px 0; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
            color: #888; border-radius: 10px; cursor: pointer; transition: 0.3s;
            font-size: 0.85rem; font-family: var(--font-head); font-weight: bold; text-transform: uppercase;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .format-btn:hover { background: rgba(255,255,255,0.05); color: white; }
        .format-btn.active {
            background: rgba(0,242,255,0.15); border-color: var(--accent-cyan);
            color: var(--accent-cyan); box-shadow: 0 0 15px rgba(0,242,255,0.3); transform: translateY(-2px);
        }

        /* --- DOWNLOAD BUTTON --- */
        .download-btn {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            background: var(--accent-gradient); color: white; font-size: 1.05rem; font-weight: bold; font-family: var(--font-head);
            text-transform: uppercase; letter-spacing: 1px; cursor: pointer;
            transition: all 0.3s ease; display: flex; justify-content: center; align-items: center; gap: 10px;
            box-shadow: 0 5px 20px rgba(189, 0, 255, 0.4);
            white-space: nowrap; /* Prevents awkward wrapping on mobile */
        }
        .download-btn:active { transform: scale(0.96); box-shadow: 0 2px 10px rgba(189,0,255,0.4); }
        .download-btn:disabled { background: #333; color: #777; cursor: not-allowed; box-shadow: none; transform: none; border: 1px solid #444;}

        /* --- MODERN LOADER --- */
        .loader-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(7,3,17,0.9); border-radius: 20px; z-index: 20; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .cyber-circle { width: 60px; height: 60px; border: 3px dashed var(--accent-cyan); border-radius: 50%; animation: spin 2s linear infinite; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        .cyber-inner { width: 30px; height: 30px; background: rgba(0,242,255,0.2); border-radius: 50%; box-shadow: 0 0 20px var(--accent-cyan); animation: pulse 1s infinite alternate; }
        .loader-text { font-family: var(--font-head); color: var(--accent-cyan); font-weight: bold; letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 0 10px rgba(0,242,255,0.5); }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { transform: scale(0.8); opacity: 0.5; } 100% { transform: scale(1.2); opacity: 1; } }

        /* --- TOAST STATUS --- */
        #customToast { visibility: hidden; min-width: 250px; background-color: var(--accent-cyan); color: #000; text-align: center; border-radius: 10px; padding: 14px; position: fixed; z-index: 5000; left: 50%; bottom: -50px; transform: translateX(-50%); font-family: var(--font-head); font-weight: bold; box-shadow: 0 5px 15px rgba(0,242,255,0.5); opacity: 0; transition: opacity 0.4s, bottom 0.4s; }
        #customToast.show { visibility: visible; opacity: 1; bottom: 30px; }

        /* --- HIDDEN TEMPLATES FOR FILE GENERATION --- */
        #docTemplate { display: none; }
        
        /* PDF STYLING */
        .pdf-container { background: #ffffff; color: #000000; padding: 30px; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; width: 800px; box-sizing: border-box; }
        .pdf-header { text-align: center; border-bottom: 3px solid #bd00ff; padding-bottom: 20px; margin-bottom: 20px; }
        .pdf-logo { font-size: 28px; font-weight: 900; color: #070311; text-transform: uppercase; letter-spacing: 2px; margin: 0; }
        .pdf-title { color: #8a2be2; margin: 10px 0 5px; font-size: 22px; text-transform: uppercase; }
        .pdf-meta { color: #555; font-size: 14px; margin: 0; }
        .pdf-team-box { margin-bottom: 25px; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; }
        .pdf-team-head { background: #f8f9fa; padding: 10px 15px; margin: 0; font-size: 16px; color: #070311; border-bottom: 2px solid #00f2ff; }
        .pdf-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .pdf-table th { background: #fff; padding: 10px 15px; text-align: left; color: #888; text-transform: uppercase; border-bottom: 1px solid #ddd; }
        .pdf-table td { padding: 10px 15px; border-bottom: 1px solid #eee; }
        .pdf-table tr:last-child td { border-bottom: none; }
        .pdf-footer { text-align: center; color: #aaa; font-size: 10px; margin-top: 30px; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

    <canvas id="particles-canvas"></canvas>

    <div class="container">
        <div class="loader-overlay" id="mainLoader">
            <div class="cyber-circle"><div class="cyber-inner"></div></div>
            <div class="loader-text" id="loaderText">Extracting...</div>
        </div>

        <div class="logo-container">
            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg_20wCR-WBMpQmw3vxcYUf-vxIO1PYDJoQN_Sid3UDjA9tf0cuX0eH40jbzHoJad4cxbnjhPjqfCw1Z5V1LhgN9zFuIQC0fJjecTy3D9PFu5WjR2H1wHwTD1bUGnXY_NiApWn5gMs6velcQngSzKoP1yHzX0cVsFSUFM8zIefcbiPayY7680Kz0V0ZAAE/s1264/1000093706.png" alt="Tournyx Logo">
            <h1 class="logo-text">Tournyx</h1>
            <p class="tagline">Organizer Roster Portal</p>
        </div>

        <div class="input-group">
            <label>Tournament Match ID</label>
            <input type="text" id="matchId" placeholder="e.g., TX-12345" autocomplete="off">
            <i class="fa-solid fa-hashtag"></i>
        </div>

        <div class="input-group">
            <label>Registered Organizer Email</label>
            <input type="email" id="email" placeholder="admin@tournyx.com" autocomplete="off">
            <i class="fa-solid fa-envelope"></i>
        </div>

        <label>Select Download Format</label>
        <div class="format-grid">
            <button class="format-btn active" onclick="selectFormat(this, 'pdf'); triggerHaptic();"><i class="fa-solid fa-file-pdf"></i> PDF</button>
            <button class="format-btn" onclick="selectFormat(this, 'word'); triggerHaptic();"><i class="fa-solid fa-file-word"></i> Word</button>
            <button class="format-btn" onclick="selectFormat(this, 'txt'); triggerHaptic();"><i class="fa-solid fa-file-lines"></i> TXT</button>
        </div>

        <button class="download-btn" id="downloadBtn" onclick="processDownload(); triggerHaptic();">
            <i class="fa-solid fa-cloud-arrow-down"></i> <span id="btnText">Verify & Download</span>
        </button>
    </div>

    <div id="customToast">Notification</div>

    <!-- HIDDEN HTML TEMPLATE FOR PDF/WORD GENERATION -->
    <div id="docTemplate">
        <div class="pdf-container">
            <div class="pdf-header">
                <h1 class="pdf-logo">TOURNYX ESPORTS</h1>
                <h3 id="docTitle" class="pdf-title"></h3>
                <p id="docMeta" class="pdf-meta"></p>
            </div>
            <div id="docContent"></div>
            <div class="pdf-footer">Official Cryptographic Roster generated by Tournyx Organizer Portal</div>
        </div>
    </div>

    <script>
        // --- BACKGROUND ANIMATION ---
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let pArray = [];
        class P { constructor(){ this.x=Math.random()*canvas.width; this.y=Math.random()*canvas.height; this.s=Math.random()*2; } u(){ this.y-=0.5; if(this.y<0)this.y=canvas.height; } d(){ ctx.fillStyle='rgba(189,0,255,0.2)'; ctx.beginPath(); ctx.arc(this.x,this.y,this.s,0,Math.PI*2); ctx.fill(); } }
        for(let i=0; i<40; i++) pArray.push(new P());
        function anim(){ ctx.clearRect(0,0,canvas.width,canvas.height); pArray.forEach(p=>{p.u();p.d()}); requestAnimationFrame(anim); }
        anim();

        function triggerHaptic() { if(navigator.vibrate) navigator.vibrate(30); }

        function showToast(msg, isError = false) {
            let t = document.getElementById("customToast");
            t.innerText = msg;
            t.style.backgroundColor = isError ? "#ff4d4d" : "var(--accent-cyan)";
            t.style.color = isError ? "white" : "#000";
            t.className = "show";
            setTimeout(() => { t.className = t.className.replace("show", ""); }, 3500);
        }

        // 👉 KEEP YOUR LIVE WEB APP URL HERE:
        const API_URL = "https://script.google.com/macros/s/AKfycbyqqTpgaflxKJ9xH0jq7mJ_jLzcoNhas3gNo0h5gvoa_6r5Ae9NFxJAJp7ZoYNnMRKl/exec";

        let selectedFormat = 'pdf';

        function selectFormat(btn, format) {
            document.querySelectorAll('.format-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedFormat = format;
        }

        async function processDownload() {
            const matchId = document.getElementById('matchId').value.trim();
            const email = document.getElementById('email').value.trim();
            const btn = document.getElementById('downloadBtn');
            const loader = document.getElementById('mainLoader');
            const lText = document.getElementById('loaderText');

            if (!matchId || !email) {
                showToast('⚠️ Please enter both Match ID and Email.', true);
                return;
            }

            // Lock UI and show Cyber Loader
            btn.disabled = true;
            loader.style.display = 'flex';
            lText.innerText = 'EXTRACTING DATA...';

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ action: 'get_roster_pdf_data', match_id: matchId, email: email })
                });

                const result = await response.json();

                if (result.status === "success") {
                    lText.innerText = 'GENERATING FILE...';
                    
                    // Allow a tiny delay for visual effect
                    setTimeout(() => {
                        if (selectedFormat === 'pdf') generatePDF(result.data, matchId);
                        else if (selectedFormat === 'word') generateWord(result.data, matchId);
                        else if (selectedFormat === 'txt') generateText(result.data, matchId);

                        showToast(`✨ Success! Your ${selectedFormat.toUpperCase()} is downloading.`);
                        resetUI(btn, loader);
                    }, 800);
                    
                } else {
                    showToast('🛑 Access Denied: ' + result.data, true);
                    resetUI(btn, loader);
                }

            } catch (error) {
                showToast('❌ Server Error. Please check your connection.', true);
                resetUI(btn, loader);
            }
        }

        function resetUI(btn, loader) {
            btn.disabled = false;
            loader.style.display = 'none';
        }

        // --- GENERATORS WITH NEW LOCATION DATA ---

        function populateTemplate(data) {
            document.getElementById('docTitle').innerText = data.tournament_title;
            document.getElementById('docMeta').innerText = `Match ID: ${data.match_id}  |  Total Teams: ${data.total_teams}`;
            
            let html = '';
            data.teams.forEach((team, i) => {
                html += `<div class="pdf-team-box">`;
                html += `<h4 class="pdf-team-head">Slot ${i+1} - ${team.clan_name}</h4>`;
                html += `<table class="pdf-table">`;
                html += `<tr><th>Player</th><th>IGN</th><th>UID</th><th>Phone</th><th>Location</th></tr>`;
                
                if (team.roster.length > 0) {
                    team.roster.forEach(p => {
                        let loc = (p.city && p.state) ? `${p.city}, ${p.state}` : (p.state || p.city || 'N/A');
                        
                        html += `<tr>
                                    <td style="font-weight:bold;">${p.name} <span style="color:#888; font-weight:normal; font-size:10px;">(${p.role})</span></td>
                                    <td>${p.gameName}</td>
                                    <td style="font-family: monospace;">${p.uid}</td>
                                    <td>${p.phone || 'N/A'}</td>
                                    <td>${loc}</td>
                                 </tr>`;
                    });
                } else {
                    html += `<tr><td colspan="5" style="text-align:center; color:#888;">No player data found.</td></tr>`;
                }
                html += `</table></div>`;
            });
            document.getElementById('docContent').innerHTML = html;
        }

        function generatePDF(data, matchId) {
            populateTemplate(data);
            const element = document.getElementById('docTemplate');
            element.style.display = 'block'; 
            
            html2pdf().from(element).set({
                margin: 10,
                filename: `Tournyx_${matchId}_Roster.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            }).save().then(() => {
                element.style.display = 'none'; 
            });
        }

        function generateWord(data, matchId) {
            populateTemplate(data);
            const content = document.getElementById('docTemplate').innerHTML;
            
            const blob = new Blob(['\ufeff', `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head><meta charset='utf-8'></head><body>${content}</body></html>
            `], { type: 'application/msword' });
            
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Tournyx_${matchId}_Roster.doc`;
            link.click();
        }

        function generateText(data, matchId) {
            let text = `=======================================\n`;
            text = `🏆 TOURNYX ROSTER: ${data.tournament_title}\nMatch ID: ${data.match_id}\nTotal Teams: ${data.total_teams}\n`;
            text += `=======================================\n\n`;
            
            data.teams.forEach((team, i) => {
                text += `---------------------------------------\n`;
                text += `[ SLOT ${i+1} ] - ${team.clan_name}\n`;
                text += `---------------------------------------\n`;
                team.roster.forEach(p => {
                    let loc = (p.city && p.state) ? `${p.city}, ${p.state}` : (p.state || p.city || 'N/A');
                    text += `* ${p.name} (${p.role}) | IGN: ${p.gameName} | UID: ${p.uid} | Ph: ${p.phone || 'N/A'} | Loc: ${loc}\n`;
                });
                text += `\n`;
            });

            const blob = new Blob([text], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Tournyx_${matchId}_Roster.txt`;
            link.click();
        }
    </script>
</body>
</html>
