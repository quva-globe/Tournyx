<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizer Portal | Tournyx TM</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg-dark: #0f1016;
            --card-bg: rgba(26, 28, 35, 0.85);
            --primary: #8a2be2;
            --secondary: #00ffcc;
            --text-main: #ffffff;
            --text-sub: #aaaaaa;
            --glass-border: rgba(138, 43, 226, 0.3);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; /* For background animations */
        }

        /* 🌌 ANIMATED BACKGROUND (Tournyx Theme) */
        .bg-grid {
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px; transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            animation: gridMove 20s linear infinite; z-index: -3;
        }
        .orb {
            position: absolute; border-radius: 50%; filter: blur(80px); z-index: -2; opacity: 0.5;
        }
        .orb-1 { width: 300px; height: 300px; background: var(--primary); top: 10%; left: 20%; animation: floatOrb 12s ease-in-out infinite alternate; }
        .orb-2 { width: 250px; height: 250px; background: var(--secondary); bottom: 10%; right: 20%; animation: floatOrb 15s ease-in-out infinite alternate-reverse; }

        /* 💎 GLASSMORPHISM CONTAINER */
        .container {
            background: var(--card-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 40px; border-radius: 16px; width: 90%; max-width: 450px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), 0 0 20px rgba(138,43,226,0.1);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 10;
        }

        /* LOGO & HEADERS */
        .logo {
            font-size: 36px; font-weight: 700; text-align: center; text-transform: uppercase; margin: 0;
            background: linear-gradient(to right, #b468ff, #00ffcc);
            -webkit-background-clip: text; color: transparent;
            text-shadow: 0 0 20px rgba(138,43,226,0.3);
        }
        .tagline { text-align: center; color: var(--text-sub); font-size: 11px; letter-spacing: 3px; margin: 0 0 30px 0; text-transform: uppercase; }

        /* INPUTS */
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 12px; color: var(--text-sub); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;}
        input {
            width: 100%; padding: 14px; border-radius: 8px; background: rgba(0,0,0,0.4);
            border: 1px solid #333; color: white; font-family: 'Poppins'; font-size: 15px; box-sizing: border-box;
            transition: all 0.3s ease;
        }
        input:focus { border-color: var(--secondary); box-shadow: 0 0 15px rgba(0,255,204,0.2); outline: none; }

        /* FORMAT SELECTOR */
        .format-grid { display: flex; gap: 10px; margin-bottom: 25px; }
        .format-btn {
            flex: 1; padding: 10px; background: rgba(0,0,0,0.4); border: 1px solid #333;
            color: var(--text-sub); border-radius: 8px; cursor: pointer; transition: 0.3s;
            font-size: 13px; font-weight: 600;
        }
        .format-btn:hover { background: rgba(255,255,255,0.05); }
        .format-btn.active {
            background: rgba(138,43,226,0.2); border-color: var(--primary);
            color: white; box-shadow: 0 0 15px rgba(138,43,226,0.3);
        }

        /* DOWNLOAD BUTTON */
        .download-btn {
            width: 100%; padding: 16px; border-radius: 8px; border: none;
            background: linear-gradient(45deg, var(--primary), #6a1b9a);
            color: white; font-size: 16px; font-weight: bold; font-family: 'Poppins';
            text-transform: uppercase; letter-spacing: 1px; cursor: pointer;
            transition: all 0.3s ease; display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .download-btn:hover { background: linear-gradient(45deg, #a755f7, var(--primary)); box-shadow: 0 5px 20px rgba(138,43,226,0.4); transform: translateY(-2px); }
        .download-btn:disabled { background: #333; color: #777; cursor: not-allowed; box-shadow: none; transform: none; }

        /* LOADER ANIMATION */
        .spinner { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.2); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite; display: none; }

        /* STATUS MESSAGE */
        .status { margin-top: 20px; text-align: center; font-size: 13px; padding: 12px; border-radius: 8px; display: none; animation: popIn 0.3s ease; }
        .status.success { background: rgba(0,255,204,0.1); border: 1px solid var(--secondary); color: var(--secondary); }
        .status.error { background: rgba(255,76,76,0.1); border: 1px solid #ff4c4c; color: #ff4c4c; }

        /* KEYFRAMES */
        @keyframes gridMove { from { background-position: 0 0; } to { background-position: 0 40px; } }
        @keyframes floatOrb { 0% { transform: translate(0, 0); } 100% { transform: translate(30px, -40px); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }

        /* HIDDEN TEMPLATES FOR FILE GENERATION */
        #docTemplate { display: none; }
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <h1 class="logo">Tournyx</h1>
        <p class="tagline">Organizer Roster Portal</p>

        <div class="input-group">
            <label>Tournament Match ID</label>
            <input type="text" id="matchId" placeholder="e.g., TX-12345" autocomplete="off">
        </div>

        <div class="input-group">
            <label>Registered Organizer Email</label>
            <input type="email" id="email" placeholder="email@example.com" autocomplete="off">
        </div>

        <label>Select Download Format</label>
        <div class="format-grid">
            <button class="format-btn active" onclick="selectFormat(this, 'pdf')">📄 PDF</button>
            <button class="format-btn" onclick="selectFormat(this, 'word')">📝 Word</button>
            <button class="format-btn" onclick="selectFormat(this, 'txt')">🗒️ Document</button>
        </div>

        <button class="download-btn" id="downloadBtn" onclick="processDownload()">
            <div class="spinner" id="loader"></div>
            <span id="btnText">Verify & Download</span>
        </button>

        <div id="statusBox" class="status"></div>
    </div>

    <div id="docTemplate">
        <div style="font-family: sans-serif; color: #000; padding: 20px;">
            <h1 style="color: #8a2be2; text-align: center;">TOURNYX ROSTER</h1>
            <h3 id="docTitle" style="text-align: center; color: #333;"></h3>
            <p id="docMeta" style="text-align: center; color: #666; font-size: 14px;"></p>
            <hr style="border: 1px solid #ddd; margin-bottom: 20px;">
            <div id="docContent"></div>
            <p style="text-align: center; color: #aaa; font-size: 10px; margin-top: 40px;">Generated by Tournyx TM Organizer Portal</p>
        </div>
    </div>

    <script>
        // 👉 PASTE YOUR LIVE WEB APP URL HERE:
        const API_URL = "https://script.google.com/macros/s/AKfycbyqqTpgaflxKJ9xH0jq7mJ_jLzcoNhas3gNo0h5gvoa_6r5Ae9NFxJAJp7ZoYNnMRKl/exec";

        let selectedFormat = 'pdf';

        function selectFormat(btn, format) {
            document.querySelectorAll('.format-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedFormat = format;
        }

        async function processDownload() {
            const matchId = document.getElementById('matchId').value.trim();
            const email = document.getElementById('email').value.trim();
            const btn = document.getElementById('downloadBtn');
            const loader = document.getElementById('loader');
            const btnText = document.getElementById('btnText');
            const statusBox = document.getElementById('statusBox');

            if (!matchId || !email) {
                showStatus('error', '⚠️ Please enter both Match ID and Email.');
                return;
            }

            // Animation & UI locking
            btn.disabled = true;
            loader.style.display = 'block';
            btnText.innerText = 'Extracting Data...';
            statusBox.style.display = 'none';

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ action: 'get_roster_pdf_data', match_id: matchId, email: email })
                });

                const result = await response.json();

                if (result.status === "success") {
                    btnText.innerText = 'Generating File...';
                    
                    // Route to correct format generator
                    if (selectedFormat === 'pdf') generatePDF(result.data, matchId);
                    else if (selectedFormat === 'word') generateWord(result.data, matchId);
                    else if (selectedFormat === 'txt') generateText(result.data, matchId);

                    showStatus('success', `✨ Success! Your ${selectedFormat.toUpperCase()} is downloading.`);
                } else {
                    showStatus('error', '🛑 Access Denied: ' + result.data);
                }

            } catch (error) {
                showStatus('error', '❌ Server Error. Please check your connection.');
            }

            // Reset UI
            setTimeout(() => {
                btn.disabled = false;
                loader.style.display = 'none';
                btnText.innerText = 'Verify & Download';
            }, 2000);
        }

        function showStatus(type, msg) {
            const box = document.getElementById('statusBox');
            box.className = `status ${type}`;
            box.innerText = msg;
            box.style.display = 'block';
        }

        // --- GENERATORS ---

        function populateTemplate(data) {
            document.getElementById('docTitle').innerText = data.tournament_title;
            document.getElementById('docMeta').innerText = `Match ID: ${data.match_id} | Total Teams: ${data.total_teams}`;
            
            let html = '';
            data.teams.forEach((team, i) => {
                html += `<div style="margin-bottom: 20px;">`;
                html += `<h4 style="background: #f0f0f0; padding: 8px; margin-bottom: 5px;">${i+1}. ${team.clan_name}</h4>`;
                html += `<table style="width: 100%; border-collapse: collapse; font-size: 13px;">`;
                html += `<tr style="border-bottom: 2px solid #ddd; text-align: left;"><th>Player</th><th>IGN</th><th>UID</th><th>Phone</th></tr>`;
                
                if (team.roster.length > 0) {
                    team.roster.forEach(p => {
                        html += `<tr style="border-bottom: 1px solid #eee;">
                                    <td style="padding: 5px;">${p.name} (${p.role})</td>
                                    <td>${p.gameName}</td>
                                    <td style="font-family: monospace;">${p.uid}</td>
                                    <td>${p.phone}</td>
                                 </tr>`;
                    });
                } else {
                    html += `<tr><td colspan="4">No player data found.</td></tr>`;
                }
                html += `</table></div>`;
            });
            document.getElementById('docContent').innerHTML = html;
        }

        function generatePDF(data, matchId) {
            populateTemplate(data);
            const element = document.getElementById('docTemplate');
            element.style.display = 'block'; // Unhide for rendering
            
            html2pdf().from(element).set({
                margin: 10,
                filename: `Tournyx_${matchId}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            }).save().then(() => {
                element.style.display = 'none'; // Hide again
            });
        }

        function generateWord(data, matchId) {
            populateTemplate(data);
            const content = document.getElementById('docTemplate').innerHTML;
            
            // Standard MS Word Blob magic
            const blob = new Blob(['\ufeff', `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head><meta charset='utf-8'></head><body>${content}</body></html>
            `], { type: 'application/msword' });
            
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Tournyx_${matchId}.doc`;
            link.click();
        }

        function generateText(data, matchId) {
            let text = `🏆 TOURNYX ROSTER: ${data.tournament_title}\nMatch ID: ${data.match_id}\nTotal Teams: ${data.total_teams}\n\n`;
            
            data.teams.forEach((team, i) => {
                text += `===================================\n`;
                text += `${i+1}. ${team.clan_name}\n`;
                text += `===================================\n`;
                team.roster.forEach(p => {
                    text += `- ${p.name} (${p.role}) | IGN: ${p.gameName} | UID: ${p.uid} | Ph: ${p.phone}\n`;
                });
                text += `\n`;
            });

            const blob = new Blob([text], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Tournyx_${matchId}.txt`;
            link.click();
        }
    </script>
</body>
</html>
